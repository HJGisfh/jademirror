# 在 deploy 目录执行：docker compose up -d --build
# 需先在同级放置 .env（可从 .env.example 复制）

services:
  jademirror-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: jademirror-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      PORT: "5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
